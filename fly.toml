# fly.toml app configuration file generated for online-store-back on 2026-06-28T19:34:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'online-store-back'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  LOG_CHANNEL = 'stderr'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/var/www/html/public'
  url_prefix = '/'
