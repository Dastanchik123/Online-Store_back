name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shop_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shop_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, mbstring, exif, pcntl, bcmath, gd, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Синтаксис каждого PHP-файла — ловит опечатки/незакрытые скобки до деплоя
      - name: Lint (php -l)
        run: find app config database routes -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: shop_test
          DB_USERNAME: shop_user
          DB_PASSWORD: password123

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: shop_test
          DB_USERNAME: shop_user
          DB_PASSWORD: password123

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: shop_test
          DB_USERNAME: shop_user
          DB_PASSWORD: password123
