server {
    listen 8080;
    root /var/www/html/public;
    index index.php index.html;

    # Редиректы (например, слэш у каталогов) должны быть относительными:
    # абсолютные подставляют внутренний порт 8080 и http вместо https
    absolute_redirect off;

    # Сжатие ответов: JSON API и бандлы фронта уменьшаются в разы
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # Ассеты Nuxt имеют хеш в имени — можно кешировать навсегда
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }
}
